name: Scrape Fixtures

on:
  workflow_dispatch:
    inputs:
      league:
        description: 'League code — leave blank for all (e.g. MEX-LMX, ENG-PL)'
        required: false
        default: ''
  schedule:
    - cron: '0 7 * * *'   # daily at 7:00 UTC (1hr after fbref scrape)

jobs:
  scrape-fixtures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run fixture scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          if [ -n "${{ github.event.inputs.league }}" ]; then
            python -m scripts.scrape_fixtures --headless --league ${{ github.event.inputs.league }}
          else
            python -m scripts.scrape_fixtures --headless
          fi
